<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelist Trades</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


    <nav class="navbar">
        <div class="logo"><span>DUELIST</span><span>VALUES</span></div>
        <div class="nav-links">
            <button class="nav-btn active" id="tab-values">Values</button>
            <button class="nav-btn" id="tab-calculator">Calculator</button>
        </div>
    </nav>

    <div class="container">

        <!-- Values View -->
        <div id="view-values">
            <div class="page-header">
                <h1>Values list</h1>
                <p>Under development, some items is missing.</p>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Search for items...">
            </div>
            <div class="categories" id="category-container"></div>
            <div class="items-grid" id="items-grid"></div>
        </div>

        <!-- Calculator View -->
        <div id="view-calculator" class="calculator-section hidden">
            <div class="page-header">
                <h1>Calculator</h1>
                <p>Calculate if you lose, win or its a fair trade.</p>
            </div>

            <div class="calc-arena">
                <div class="calc-side your-side">
                    <div class="calc-side-header">
                        <span class="side-title">Your Offer</span>
                        <span id="your-total" style="font-weight:700;">$0</span>
                    </div>
                    <div class="calc-items">
                        <div id="your-items-list" style="display:contents;"></div>
                        <button class="add-item-btn" id="btn-add-your">+</button>
                    </div>
                </div>

                <div class="calc-side their-side">
                    <div class="calc-side-header">
                        <span class="side-title">Their Offer</span>
                        <span id="their-total" style="font-weight:700;">$0</span>
                    </div>
                    <div class="calc-items">
                        <div id="their-items-list" style="display:contents;"></div>
                        <button class="add-item-btn" id="btn-add-their">+</button>
                    </div>
                </div>
            </div>

            <div class="diff-engine">
                <div class="diff-engine-header">
                    <span>You: <span id="diff-you">$0</span></span>
                    <span>Them: <span id="diff-them">$0</span></span>
                </div>
                <div class="diff-bar-track">
                    <div class="diff-bar-fill" id="diff-fill"></div>
                </div>
                <div class="diff-result-badge" id="diff-text">Add Items</div>
            </div>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="item-modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" class="modal-search" id="modal-search" placeholder="Search item to add...">
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
